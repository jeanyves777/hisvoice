<svg width="100%" viewBox="0 0 680 390" xmlns="http://www.w3.org/2000/svg">
  

  <!-- Subtle outer aura rings -->
  <circle cx="340" cy="165" r="115" fill="none" stroke="#C9A96E" stroke-width="0.3" opacity="0.3" style="fill:none;stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:0.3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="340" cy="165" r="112" fill="none" stroke="#C9A96E" stroke-width="0.3" opacity="0.5" style="fill:none;stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:0.3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Medallion fill -->
  <circle cx="340" cy="165" r="108" fill="#0C0906" style="fill:rgb(12, 9, 6);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Main outer ring -->
  <circle cx="340" cy="165" r="108" fill="none" stroke="#C9A96E" stroke-width="1.4" style="fill:none;stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:1.4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Inner dashed decorative ring -->
  <circle cx="340" cy="165" r="90" fill="none" stroke="#C9A96E" stroke-width="0.4" stroke-dasharray="2,7" style="fill:none;stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:0.4px;stroke-dasharray:2px, 7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- SOUND WAVES — RIGHT side (clockwise arcs) -->
  <!-- r=22 -->
  <path d="M 340,143 A 22,22 0 0,1 340,187" fill="none" stroke="#C9A96E" stroke-width="2.2" stroke-linecap="round" style="fill:none;stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:2.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- r=39 -->
  <path d="M 340,126 A 39,39 0 0,1 340,204" fill="none" stroke="#C9A96E" stroke-width="1.6" stroke-linecap="round" style="fill:none;stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:1.6px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- r=57 -->
  <path d="M 340,108 A 57,57 0 0,1 340,222" fill="none" stroke="#C9A96E" stroke-width="1.1" stroke-linecap="round" style="fill:none;stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:1.1px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- SOUND WAVES — LEFT side (counter-clockwise arcs) -->
  <!-- r=22 -->
  <path d="M 340,143 A 22,22 0 0,0 340,187" fill="none" stroke="#C9A96E" stroke-width="2.2" stroke-linecap="round" style="fill:none;stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:2.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- r=39 -->
  <path d="M 340,126 A 39,39 0 0,0 340,204" fill="none" stroke="#C9A96E" stroke-width="1.6" stroke-linecap="round" style="fill:none;stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:1.6px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- r=57 -->
  <path d="M 340,108 A 57,57 0 0,0 340,222" fill="none" stroke="#C9A96E" stroke-width="1.1" stroke-linecap="round" style="fill:none;stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:1.1px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- CROSS — bright gold, centered at (340,165) -->
  <!-- Vertical shaft -->
  <line x1="340" y1="122" x2="340" y2="208" stroke="#F5C842" stroke-width="2.8" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 200, 66);color:rgb(255, 255, 255);stroke-width:2.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Horizontal bar — at 1/3 from top (y=122 + 28 = 150) -->
  <line x1="313" y1="150" x2="367" y2="150" stroke="#F5C842" stroke-width="2.8" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 200, 66);color:rgb(255, 255, 255);stroke-width:2.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- CARDINAL ORNAMENTS -->
  <!-- North diamond (top of ring at y=57) -->
  <path d="M 340,51 L 346,57 L 340,63 L 334,57 Z" fill="#C9A96E" style="fill:rgb(201, 169, 110);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- South diamond (bottom of ring at y=273) -->
  <path d="M 340,267 L 346,273 L 340,279 L 334,273 Z" fill="#C9A96E" style="fill:rgb(201, 169, 110);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- East circle (right of ring at x=448) -->
  <circle cx="448" cy="165" r="3.5" fill="#C9A96E" style="fill:rgb(201, 169, 110);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- West circle (left of ring at x=232) -->
  <circle cx="232" cy="165" r="3.5" fill="#C9A96E" style="fill:rgb(201, 169, 110);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Small secondary diamonds at diagonals (45°) -->
  <!-- NE: angle 45, r=108 → dx=dy=76.4 → (340+76, 165-76) = (416, 89) -->
  <circle cx="416" cy="89" r="1.8" fill="#C9A96E" opacity="0.6" style="fill:rgb(201, 169, 110);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- NW -->
  <circle cx="264" cy="89" r="1.8" fill="#C9A96E" opacity="0.6" style="fill:rgb(201, 169, 110);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- SE -->
  <circle cx="416" cy="241" r="1.8" fill="#C9A96E" opacity="0.6" style="fill:rgb(201, 169, 110);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- SW -->
  <circle cx="264" cy="241" r="1.8" fill="#C9A96E" opacity="0.6" style="fill:rgb(201, 169, 110);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- ORNAMENTAL RULE + CENTER DOT above wordmark -->
  <line x1="192" y1="307" x2="318" y2="307" stroke="#C9A96E" stroke-width="0.6" style="fill:rgb(0, 0, 0);stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="340" cy="307" r="2.8" fill="#C9A96E" style="fill:rgb(201, 169, 110);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="362" y1="307" x2="488" y2="307" stroke="#C9A96E" stroke-width="0.6" style="fill:rgb(0, 0, 0);stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- WORDMARK -->
  <text x="340" y="336" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#E8D5A3" letter-spacing="11" style="fill:rgb(232, 213, 163);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:36px;font-weight:700;text-anchor:middle;dominant-baseline:auto">HIS VOICE</text>

  <!-- TAGLINE -->
  <text x="340" y="360" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-style="italic" fill="#8A6D3A" letter-spacing="5" style="fill:rgb(138, 109, 58);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:12px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">every word he spoke</text>

  <!-- Bottom rule -->
  </svg>